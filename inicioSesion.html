<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda Web: Inicio de Sesion</title>
    <link rel="stylesheet" href="css/bootstrap.css" />
    <link rel="stylesheet" href="css/customStyles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body class="bodyStyle">
    <!-- Barra de navegacion responsive, se convierte en un offcanvas navBar al
    reducirse el tamaño de la venta. -->
    <nav class="navbar navbar-expand-sm" data-bs-theme="dark">
      <div class="container-fluid flex-row flex-nowrap">
        <div
          class="offcanvas offcanvas-start sideBarStyle"
          tabindex="-1"
          id="offcanvasNavbar"
          aria-labelledby="offcanvasNavbarLabel">
          <div class="offcanvas-header">
            <img
              src="img/log-yellow-pc-100.png"
              class="mx-1"
              height="50"
              alt="Logo" />
            <h4 class="offcanvas-title" id="offcanvasNavbarLabel">
              Tienda Web
            </h4>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="offcanvas"
              aria-label="Close"></button>
          </div>

          <div class="offcanvas-body">
            <form class="my-1" role="search" style="width: 280px">
              <div class="input-group">
                <button
                  class="btn btn-outline-warning rounded-start-pill"
                  type="button"
                  id="searchButton">
                  <i class="bi bi-search"></i>
                </button>
                <input
                  class="form-control border-warning rounded-end-pill"
                  type="search"
                  placeholder="Buscar"
                  aria-label="Search" />
              </div>
            </form>

            <div class="row my-sm-0 my-3"></div>

            <div class="d-sm-flex gap-1 ms-sm-auto">
              <a
                id="linkIniciarSesion"
                class="btn rounded-pill btn-warning my-1"
                href="#"
                role="button">
                <i class="bi bi-door-open"></i>
                <span>Iniciar Sesion</span>
              </a>

              <div class="dropdown" data-bs-theme="dark">
                <button
                  type="button"
                  id="buttonAdminActions"
                  class="btn rounded-pill btn-outline-warning align dropdown-toggle ms-sm-auto my-1"
                  data-bs-toggle="dropdown"
                  aria-expanded="false">
                  <i class="bi bi-gear"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-sm-end">
                  <li>
                    <h5 class="dropdown-header text-warning">
                      Acciones de Administrador
                    </h5>
                  </li>
                  <li>
                    <a class="dropdown-item" href="#">Alta de Usuarios</a>
                  </li>
                  <li>
                    <a class="dropdown-item" href="#">Usuarios Registrados</a>
                  </li>
                  <li>
                    <a class="dropdown-item" href="#">Catalogo de Productos</a>
                  </li>
                  <li>
                    <a class="dropdown-item" href="#">Etiquetas/Categorias</a>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasNavbar"
          aria-controls="offcanvasNavbar"
          aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
    </nav>

    <main class="my-2">
      <div class="card text-bg-dark shadow mx-auto w-50" data-bs-theme="dark">
        <div class="card-header">
          <i class="bi bi-door-open text-warning"></i>
          <span>Inicio de Sesion</span>
        </div>
        <div class="card-body">
          <form class="formAltaUsuario">
            <div class="input-group my-2 w-75 mx-auto">
              <span
                class="input-group-text rounded-start-pill text-warning border-warning-subtle"
                id="basic-addon-username">
                <i class="bi bi-person"></i>
              </span>
              <input
                type="text"
                id="inputUsername"
                class="form-control rounded-end-pill text-white border-warning-subtle"
                placeholder="Usuario"
                aria-label="Usuario"
                aria-describedby="basic-addon-username" />
            </div>
            <div class="input-group my-2 w-75 mx-auto">
              <span
                class="input-group-text rounded-start-pill text-warning border-warning-subtle"
                id="basic-addon-password">
                <i class="bi bi-key"></i>
              </span>
              <input
                type="password"
                id="inputPassword"
                class="form-control rounded-end-pill text-white border-warning-subtle"
                placeholder="Contraseña"
                aria-label="Contraseña"
                aria-describedby="basic-addon-password" />
            </div>
            <div class="d-grid my-4 w-75 mx-auto">
              <button class="btn btn-outline-warning" type="submit">
                Ingresar
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="my-2"></footer>

    <script src="js/bootstrap.bundle.js"></script>
  </body>
</html>
