<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda Web: Creacion de cuenta</title>
    <link
      rel="shortcut icon"
      href="img/favicon-yellow-pc-96.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../css/bootstrap.css" />
    <link rel="stylesheet" href="../css/customStyles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bodyStyle">
    <!-- Barra de navegacion responsive, se convierte en un offcanvas navBar al
    reducirse el tamaño de la venta. -->
    <nav class="navbar navbar-expand-sm bg-black" data-bs-theme="dark">
      <div class="container-fluid flex-row flex-nowrap">
        <div
          class="offcanvas offcanvas-start bodyStyle"
          tabindex="-1"
          id="offcanvasNavbar"
          aria-labelledby="offcanvasNavbarLabel"
        >
          <div class="offcanvas-header bg-black">
            <img
              src="../img/logo-yellow-pc-100.png"
              class="mx-1"
              height="50"
              alt="Logo"
            />
            <h4 class="offcanvas-title" id="offcanvasNavbarLabel">
              Tienda Web
            </h4>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="offcanvas"
              aria-label="Close"
            ></button>
          </div>

          <div class="offcanvas-body">
            <form class="my-1" role="search" style="width: 280px">
              <div class="input-group">
                <button
                  class="btn btn-outline-warning rounded-start-pill"
                  type="button"
                  id="searchButton"
                >
                  <i class="bi bi-search"></i>
                </button>
                <input
                  class="form-control border-warning-subtle rounded-end-pill"
                  type="search"
                  placeholder="Buscar"
                  aria-label="Search"
                />
              </div>
            </form>

            <div class="row my-sm-0 my-3"></div>

            <div class="d-sm-flex gap-1 ms-sm-auto">
              <a
                id="linkCatalogo"
                class="btn rounded-pill btn-outline-warning my-1"
                href="#"
                role="button"
              >
                <i class="bi bi-bag-fill"></i>
                <span>Catalogo</span>
              </a>

              <a
                id="linkCarrito"
                class="btn rounded-pill btn-outline-warning my-1"
                href="#"
                role="button"
              >
                <i class="bi bi-cart-fill"></i>
                <span>Carrito</span>
              </a>

              <a
                id="linkIniciarSesion"
                class="btn rounded-pill btn-outline-warning my-1"
                href="#"
                role="button"
              >
                <i class="bi bi-door-open-fill"></i>
                <span>Iniciar Sesion</span>
              </a>

              <div class="dropdown" data-bs-theme="dark">
                <button
                  type="button"
                  id="buttonAdminActions"
                  class="btn rounded-pill btn-outline-warning dropdown-toggle ms-sm-auto my-1"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  <i class="bi bi-gear-fill"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-sm-end">
                  <li>
                    <h5 class="dropdown-header text-warning">
                      Acciones de Administrador
                    </h5>
                  </li>
                  <li>
                    <a class="dropdown-item text-warning" href="#">Alta de Usuarios</a>
                  </li>
                  <li>
                    <a class="dropdown-item" href="#">Usuarios Registrados</a>
                  </li>
                  <li>
                    <a class="dropdown-item" href="#">Catalogo de Productos</a>
                  </li>
                  <li>
                    <a class="dropdown-item" href="#">Etiquetas/Categorias</a>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasNavbar"
          aria-controls="offcanvasNavbar"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
    </nav>

    <main class="my-2">

      <div class="card mx-auto w-50 border-0 shadow-lg" data-bs-theme="dark">
        <div class="card-header cardStyle border-bottom border-warning">
          <i class="bi bi-person-plus"></i>
          <span>Crear cuenta</span>
        </div>
        <div class="card-body cardStyle">
          <form class="formAltaUsuario">
            <div class="input-group my-2 w-75 pb-2 mx-auto">
              <span
                class="input-group-text rounded-start-pill text-warning border-warning-subtle"
                id="basic-addon-username"
              >
                <i class="bi bi-person"></i>
              </span>

              <input
                type="text"
                id="input_register_username"
                class="form-control rounded-end-pill text-white border-warning-subtle"
                placeholder="Nombre de usuario"
                aria-label="Nombre de usuario"
                aria-describedby="basic-addon-username" 
              /> <!-- preguntar -->
            </div>


            <div class="input-group my-2 w-75 pb-2 mx-auto">
              <span
                class="input-group-text rounded-start-pill text-warning border-warning-subtle"
                id="basic-addon-email"
              >
                <i class="bi bi-envelope"></i>
              </span>

              <input
                type="email"
                id="input_register_email"
                class="form-control rounded-end-pill text-white border-warning-subtle"
                placeholder="Email"
                aria-label="Email"
                aria-describedby="basic-addon-email"/>
              
            </div>

              <div class="input-group my-2 w-75 pb-2 mx-auto">
                <span
                  class="input-group-text rounded-start-pill text-warning border-warning-subtle"
                  id="basic-addon-telephone">
                <i class="bi bi-telephone"></i>
              </span>

              <input
                type="tel"
                id="input_register_telefono"
                class="form-control rounded-end-pill text-white border-warning-subtle"
                placeholder="Telefono"
                aria-label="Telefono"
                aria-describedby="basic-addon-telephone"/>
            </div>

            <div class="input-group my-2 w-75 pb-2 mx-auto">
              <span
                class="input-group-text rounded-start-pill text-warning border-warning-subtle"
                id="basic-addon-password"
              >
                <i class="bi bi-lock-fill"></i>
              </span>
              <input
                type="password"
                id="input_register_Password"
                class="form-control rounded-end-pill text-white border-warning-subtle"
                placeholder="Contraseña"
                aria-label="Contraseña"
                aria-describedby="basic-addon-password"
              />
            </div>

            

            <div class="input-group my-2 w-75 pb-2 mx-auto">
              <span
                class="input-group-text rounded-start-pill text-warning border-warning-subtle"
                id="basic-addon-confirm-password"
              >
                <i class="bi bi-check-circle"></i>
              </span>
              <input
                type="password"
                id="input_confirm_password"
                class="form-control rounded-end-pill text-white border-warning-subtle"
                placeholder="Confirmar contraseña"
                aria-label="Confirmar Contraseña"
                aria-describedby="basic-addon-confirm-password" 
              /> <!-- preguntar -->
            </div>

            <div class="mb-3 form-check my-2 w-75 pb-2 mx-auto">
              <input type="checkbox" class="form-check-input" id="exampleCheck1">
              <label class="form-check-label" for="exampleCheck1">Acepto los terminos y condiciones</label>
            </div>

            <div class="d-grid my-4 w-75 mx-auto">
              <button class="btn btn-outline-warning rounded-5" type="submit">
                Registrar usuario
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="my-2"></footer>

    <script src="../js/bootstrap.bundle.js"></script>
  </body>
</html>
