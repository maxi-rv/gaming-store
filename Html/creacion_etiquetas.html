<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda Web: Creacion de etiquetas</title>
    <link
      rel="shortcut icon"
      href="../img/favicon-yellow-pc-96.png"
      type="image/x-icon" />
    <link rel="stylesheet" href="../css/bootstrap.css" />
    <link rel="stylesheet" href="../css/customStyles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body class="bodyStyle">
    <!-- Barra de navegacion responsive, se convierte en un offcanvas navBar al
    reducirse el tamaño de la venta. -->
    <nav class="navbar navbar-expand-md bg-black" data-bs-theme="dark">
      <div class="container-fluid px-2 px-md-3">
        <button
          class="navbar-toggler border-warning-subtle text-warning"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasNavbar"
          aria-controls="offcanvasNavbar"
          aria-label="Toggle navigation">
          <i class="bi bi-list"></i>
        </button>
        <a class="navbar-brand d-md-none" href="#">
          <img src="../img/logo-yellow-pc-100.png" alt="logo" height="32" />
        </a>

        <div
          class="offcanvas offcanvas-start bodyStyle"
          tabindex="-1"
          id="offcanvasNavbar"
          aria-labelledby="offcanvasNavbarLabel">
          <div
            class="offcanvas-header bg-black border-bottom border-warning-subtle">
            <img
              src="../img/logo-yellow-pc-100.png"
              class="mx-1"
              height="40"
              alt="Logo" />
            <h4 class="offcanvas-title" id="offcanvasNavbarLabel">
              Tienda Web
            </h4>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="offcanvas"
              aria-label="Close"></button>
          </div>

          <div class="offcanvas-body">
            <div
              class="d-flex flex-column flex-md-row align-items-center gap-2 w-100 original-stack-order">
              <div
                class="order-md-1 me-md-auto d-flex flex-column flex-md-row flex-nowrap gap-2 w-100 w-md-auto"
                style="min-width: 180px">
                <a class="navbar-brand d-none d-md-inline" href="#">
                  <img
                    src="../img/logo-yellow-pc-100.png"
                    alt="logo"
                    height="32" />
                  <span>Tienda Web</span>
                </a>
              </div>

              <div
                class="order-md-2 w-100 w-md-autoorder-md-1 d-flex flex-column-reverse flex-md-row-reverse flex-nowrap gap-2 w-md-auto">
                <a
                  id="linkIniciarSesion"
                  class="btn rounded-pill btn-outline-warning text-nowrap my-1"
                  href="#"
                  role="button">
                  <i class="bi bi-door-open-fill"></i>
                  <span>Iniciar Sesión</span>
                </a>
                <a
                  id="linkCarrito"
                  class="btn rounded-pill btn-outline-warning text-nowrap my-1"
                  href="#"
                  role="button">
                  <i class="bi bi-cart-fill"></i>
                  <span>Carrito</span>
                </a>
                <a
                  id="linkCatalogo"
                  class="btn rounded-pill btn-outline-warning text-nowrap my-1"
                  href="../Html/catalogoProductos.html"
                  role="button">
                  <i class="bi bi-bag-fill"></i>
                  <span>Catálogo</span>
                </a>
              </div>

              <div class="dropdown order-md-3" data-bs-theme="dark">
                <button
                  type="button"
                  id="buttonAdminActions"
                  class="btn rounded-pill btn-outline-warning dropdown-toggle text-nowrap my-1"
                  data-bs-toggle="dropdown"
                  aria-expanded="false">
                  <i class="bi bi-gear-fill"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-sm-end">
                  <li>
                    <h5 class="dropdown-header text-warning">
                      Acciones de Administrador
                    </h5>
                  </li>
                  <li>
                    <a class="dropdown-item" href="#">Alta de Usuarios</a>
                  </li>
                  <li>
                    <a class="dropdown-item" href="#">Usuarios Registrados</a>
                  </li>
                  <li>
                    <a class="dropdown-item" href="#">Catálogo de Productos</a>
                  </li>
                  <li>
                    <a class="dropdown-item text-warning" href="#"
                      >Etiquetas/Categorías</a
                    >
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="my-2">
      <div class="card mx-auto w-50 border-0 shadow-lg" data-bs-theme="dark">
        <div class="card-header cardStyle border-bottom border-warning">
          <i class="bi bi-bookmark-plus"></i>
          <span>Crear Etiqueta/Categoria</span>
        </div>

        <div class="card-body cardStyle">
          <form class="formAltaUsuario">
            <div class="input-group my-2 w-75 pb-2 mx-auto">
              <span
                class="input-group-text rounded-start-pill text-warning border-warning-subtle">
                <i class="bi bi-tags"></i>
              </span>
              <select
                name="tipo"
                id="tipo"
                class="form-select rounded-end-pill text-white border-warning-subtle">
                <option value="Seleccionar" disabled selected hidden>
                  Seleccionar tipo
                </option>
                <option value="Etiqueta">Etiqueta</option>
                <option value="Categoria">Categoria</option>
              </select>
            </div>

            <div class="input-group my-2 w-75 pb-2 mx-auto">
              <span
                class="input-group-text rounded-start-pill text-warning border-warning-subtle"
                id="basic-addon-name">
                <i class="bi bi-pencil"></i>
              </span>
              <input
                type="text"
                id="input_name"
                class="form-control rounded-end-pill text-white border-warning-subtle"
                placeholder="Nombre"
                aria-label="Nombre"
                aria-describedby="basic-addon-name" />
            </div>
            <div class="input-group my-2 w-75 pb-2 mx-auto">
              <span
                class="input-group-text text-warning border-warning-subtle"
                id="basic-addon-descrip">
                <i class="bi bi-file-text"></i>
              </span>
              <textarea
                class="form-control border-warning-subtle"
                id="descrpcion"
                placeholder="Descripción"
                aria-label="Descripción"
                aria-describedby="basic-addon-descrip"></textarea>
            </div>

            <div class="d-grid my-4 w-75 mx-auto">
              <button class="btn btn-outline-warning rounded-5" type="submit">
                Crear Etiqueta/Categoria
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="my-2"></footer>

    <script src="../js/bootstrap.bundle.js"></script>
  </body>
</html>
