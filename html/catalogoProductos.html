<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda Web: Catalogo Productos</title>
    <link
      rel="shortcut icon"
      href="../img/favicon-yellow-pc-96.png"
      type="image/x-icon" />
    <link rel="stylesheet" href="../css/bootstrap.css" />
    <link rel="stylesheet" href="../css/customStyles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body class="bodyStyle">
    <!-- Barra de navegacion responsive, se convierte en un offcanvas navBar al
    reducirse el tamaño de la venta. -->
    <nav class="navbar navbar-expand-md bg-black" data-bs-theme="dark">
      <div class="container-fluid px-2 px-md-3">
        <button
          class="navbar-toggler border-warning-subtle text-warning"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasNavbar"
          aria-controls="offcanvasNavbar"
          aria-label="Toggle navigation">
          <i class="bi bi-list"></i>
        </button>
        <a class="navbar-brand d-md-none" href="#">
          <img src="../img/logo-yellow-pc-100.png" alt="logo" height="32" />
        </a>

        <div
          class="offcanvas offcanvas-start bodyStyle"
          tabindex="-1"
          id="offcanvasNavbar"
          aria-labelledby="offcanvasNavbarLabel">
          <div
            class="offcanvas-header bg-black border-bottom border-warning-subtle">
            <img
              src="../img/logo-yellow-pc-100.png"
              class="mx-1"
              height="40"
              alt="Logo" />
            <h4 class="offcanvas-title" id="offcanvasNavbarLabel">
              Tienda Web
            </h4>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="offcanvas"
              aria-label="Close"></button>
          </div>

          <div class="offcanvas-body">
            <div
              class="d-flex flex-column flex-md-row align-items-center gap-2 w-100 original-stack-order">
              <div
                class="order-md-1 me-md-auto d-flex flex-column flex-md-row flex-nowrap gap-2 w-100 w-md-auto"
                style="min-width: 180px">
                <a class="navbar-brand d-none d-md-inline" href="#">
                  <img
                    src="../img/logo-yellow-pc-100.png"
                    alt="logo"
                    height="32" />
                  <span>Tienda Web</span>
                </a>
              </div>

              <div
                class="order-md-2 w-100 w-md-autoorder-md-1 d-flex flex-column-reverse flex-md-row-reverse flex-nowrap gap-2 w-md-auto">
                <a
                  id="linkIniciarSesion"
                  class="btn rounded-pill btn-outline-warning text-nowrap my-1"
                  href="../html/inicioSesion.html"
                  role="button">
                  <i class="bi bi-door-open-fill"></i>
                  <span id="txt_sesion">Iniciar Sesión</span>
                </a>
                <a
                  id="linkCarrito"
                  class="btn rounded-pill btn-outline-warning text-nowrap my-1"
                  href="../html/carrito.html"
                  role="button">
                  <i class="bi bi-cart-fill"></i>
                  <span>Carrito</span>
                </a>
                <a
                  id="linkCatalogo"
                  class="btn rounded-pill btn-warning text-nowrap my-1"
                  href="#"
                  role="button">
                  <i class="bi bi-bag-fill"></i>
                  <span>Catálogo</span>
                </a>
              </div>

              <div class="dropdown order-md-3" data-bs-theme="dark">
                <button
                  type="button"
                  id="buttonAdminActions"
                  class="btn rounded-pill btn-outline-warning dropdown-toggle text-nowrap my-1"
                  data-bs-toggle="dropdown"
                  aria-expanded="false">
                  <i class="bi bi-gear-fill"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-sm-end">
                  <li>
                    <h5 class="dropdown-header text-warning">
                      Acciones de Administrador
                    </h5>
                  </li>
                  <li>
                    <a class="dropdown-item" href="../html/crear_cuenta.html"
                      >Alta de Usuarios</a
                    >
                  </li>
                  <li>
                    <a class="dropdown-item" href="../html/listadoCuentas.html"
                      >Usuarios Registrados</a
                    >
                  </li>
                  <li>
                    <a class="dropdown-item" href="../html/adminProductos.html"
                      >Registro de Productos</a
                    >
                  </li>
                  <li>
                    <a
                      class="dropdown-item"
                      href="../html/adminCategoriasEtiquetas.html"
                      >Categorías/Etiquetas</a
                    >
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Barra de Filtrado -->
    <section
      id="sectionFilters"
      class="d-flex justify-content-center my-2"
      data-bs-theme="dark">
      <div class="card bg-black border-1 shadow border-warning rounded-pill">
        <div class="card-body">
          <form
            id="formFiltros"
            class="needs-validation d-flex flex-wrap justify-content-center align-items-center gap-4"
            novalidate>
            <div>
              <select
                class="form-select bg-black text-warning rounded-pill border-warning-subtle"
                id="select_categorias"
                required>
                <option selected disabled value="">Categorias</option>
              </select>
            </div>

            <div>
              <div class="btn-group dropdown-center">
                <button
                  class="btn rounded-pill btn-outline-warning text-nowrap w-50 my-2"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#collapseSeleccionarEtiquetas"
                  aria-expanded="false"
                  aria-controls="collapseSeleccionarEtiquetas">
                  <i class="bi bi-tags text-warning"></i>
                  <span>Seleccionar Etiquetas</span>
                </button>
              </div>
            </div>

            <div>
              <input
                type="checkbox"
                class="btn-check"
                id="conStock"
                autocomplete="off" />
              <label class="btn btn-outline-warning rounded-pill" for="conStock"
                >Con Stock</label
              >
            </div>

            <div>
              <button
                id="botonAplicarFiltros"
                class="btn btn-warning rounded-pill text-nowrap"
                type="submit">
                Aplicar Filtros
              </button>
            </div>

            <div>
              <button
                id="botonLimpiarFiltros"
                class="btn btn-outline-warning rounded-pill text-nowrap"
                type="button">
                Limpiar Filtros
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!-- Collapse Seleccionar Etiquetas en Filtrado -->
    <section>
      <div class="collapse" id="collapseSeleccionarEtiquetas">
        <div
          class="container text-center mb-3 p-3 rounded-4 border border-warning border-1 rounded-pill bg-black">
          <div
            id="contenedor_de_etiquetas"
            class="row row-cols-4 justify-content-center"></div>
        </div>
      </div>
    </section>

    <main class="my-5">
      <div class="container text-center" data-bs-theme="dark">
        <div
          id="cardContainer"
          class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4 justify-content-center"></div>
      </div>
    </main>

    <footer class="my-2"></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/validator/13.15.15/validator.min.js"></script>
    <script src="../js/bootstrap.bundle.js"></script>
    <script
      type="module"
      src="../js/catalogoProductos/vistaCatalogoProductos.js"></script>
    <script
      type="module"
      src="../js/catalogoProductos/vistaCatalogoFiltros.js"></script>
    <script type="module" src="../js/gestores/gestor_sesion.js"></script>
    <script type="module" src="../js/btn_sesion.js"></script>
  </body>
</html>
