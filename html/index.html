<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda Web: Inicio de Sesion</title>
    <link
      rel="shortcut icon"
      href="../img/favicon-yellow-pc-96.png"
      type="image/x-icon" />
    <link rel="stylesheet" href="../css/bootstrap.css" />
    <link rel="stylesheet" href="../css/customStyles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body class="bodyStyle">
    <!-- Barra de navegacion responsive, se convierte en un offcanvas navBar al
    reducirse el tamaño de la venta. -->
    <nav class="navbar navbar-expand-md bg-black" data-bs-theme="dark">
      <div class="container-fluid px-2 px-md-3">
        <button
          class="navbar-toggler border-warning-subtle text-warning"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasNavbar"
          aria-controls="offcanvasNavbar"
          aria-label="Toggle navigation">
          <i class="bi bi-list"></i>
        </button>
        <a class="navbar-brand d-md-none" href="#">
          <img src="../img/logo-yellow-pc-100.png" alt="logo" height="32" />
        </a>

        <div
          class="offcanvas offcanvas-start bodyStyle"
          tabindex="-1"
          id="offcanvasNavbar"
          aria-labelledby="offcanvasNavbarLabel">
          <div
            class="offcanvas-header bg-black border-bottom border-warning-subtle">
            <img
              src="../img/logo-yellow-pc-100.png"
              class="mx-1"
              height="40"
              alt="Logo" />
            <h4 class="offcanvas-title" id="offcanvasNavbarLabel">
              Tienda Web
            </h4>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="offcanvas"
              aria-label="Close"></button>
          </div>

          <div class="offcanvas-body">
            <div
              class="d-flex flex-column flex-md-row align-items-center gap-2 w-100 original-stack-order">
              <div
                class="order-md-1 me-md-auto d-flex flex-column flex-md-row flex-nowrap gap-2 w-100 w-md-auto"
                style="min-width: 180px">
                <a class="navbar-brand d-none d-md-inline" href="#">
                  <img
                    src="../img/logo-yellow-pc-100.png"
                    alt="logo"
                    height="32" />
                  <span>Tienda Web</span>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="my-2">
      <div class="card mx-auto w-50 border-0 shadow-lg" data-bs-theme="dark">
        <div class="card-header cardStyle border-bottom border-warning">
          <i class="bi bi-door-open text-warning"></i>
          <span>Inicio de Sesion</span>
        </div>
        <div class="card-body cardStyle">
          <form
            class="formAltaUsuario"
            id="formulario_inicio_sesion"
            novalidate>
            <div class="input-group my-2 w-75 mx-auto">
              <span
                class="input-group-text rounded-start-pill text-warning border-warning-subtle"
                id="basic-addon-username">
                <i class="bi bi-person"></i>
              </span>
              <input
                type="text"
                id="inputUsername"
                class="form-control rounded-end-pill text-white border-warning-subtle"
                placeholder="Usuario"
                aria-label="Usuario"
                aria-describedby="basic-addon-username" />
              <div class="invalid-feedback" id="error_inicio_username"></div>
            </div>
            <div class="input-group my-2 w-75 mx-auto">
              <span
                class="input-group-text rounded-start-pill text-warning border-warning-subtle"
                id="basic-addon-password">
                <i class="bi bi-key"></i>
              </span>
              <input
                type="password"
                id="inputPassword"
                class="form-control rounded-end-pill text-white border-warning-subtle"
                placeholder="Contraseña"
                aria-label="Contraseña"
                aria-describedby="basic-addon-password" />
              <div class="invalid-feedback" id="error_inicio_password"></div>
            </div>

            <div class="d-grid my-4 w-75 mx-auto">
              <button class="btn btn-outline-warning" type="submit" id="">
                Ingresar
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="my-2"></footer>
    <script src="../js/bootstrap.bundle.js"></script>
    <script type="module" src="../js/inicio_sesion/validacion_sesion.js"></script>
    <script type="module" src="../js/inicio_sesion/iniciar_sesion.js"></script>
    <script type="module" src="../js/gestores/gestor_cuentas.js"></script>
    <script type="module" src="../js/gestores/gestor_sesion.js"></script>

  </body>
</html>
