<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda Web: Carrito</title>
    <link
      rel="shortcut icon"
      href="../img/favicon-yellow-pc-96.png"
      type="image/x-icon" />
    <link rel="stylesheet" href="../css/bootstrap.css" />
    <link rel="stylesheet" href="../css/customStyles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body class="bodyStyle">
    <!-- Barra de navegacion responsive, se convierte en un offcanvas navBar al
    reducirse el tamaño de la venta. -->
    <nav class="navbar navbar-expand-md bg-black" data-bs-theme="dark">
      <div class="container-fluid px-2 px-md-3">
        <button
          class="navbar-toggler border-warning-subtle text-warning"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasNavbar"
          aria-controls="offcanvasNavbar"
          aria-label="Toggle navigation">
          <i class="bi bi-list"></i>
        </button>
        <a class="navbar-brand d-md-none" href="#">
          <img src="../img/logo-yellow-pc-100.png" alt="logo" height="32" />
        </a>

        <div
          class="offcanvas offcanvas-start bodyStyle"
          tabindex="-1"
          id="offcanvasNavbar"
          aria-labelledby="offcanvasNavbarLabel">
          <div
            class="offcanvas-header bg-black border-bottom border-warning-subtle">
            <img
              src="../img/logo-yellow-pc-100.png"
              class="mx-1"
              height="40"
              alt="Logo" />
            <h4 class="offcanvas-title" id="offcanvasNavbarLabel">
              Tienda Web
            </h4>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="offcanvas"
              aria-label="Close"></button>
          </div>

          <div class="offcanvas-body">
            <div
              class="d-flex flex-column flex-md-row align-items-center gap-2 w-100 original-stack-order">
              <div
                class="order-md-1 me-md-auto d-flex flex-column flex-md-row flex-nowrap gap-2 w-100 w-md-auto"
                style="min-width: 180px">
                <a class="navbar-brand d-none d-md-inline" href="#">
                  <img
                    src="../img/logo-yellow-pc-100.png"
                    alt="logo"
                    height="32" />
                  <span>Tienda Web</span>
                </a>
              </div>

              <div
                class="order-md-2 w-100 w-md-autoorder-md-1 d-flex flex-column-reverse flex-md-row-reverse flex-nowrap gap-2 w-md-auto">
                <a
                  id="linkIniciarSesion"
                  class="btn rounded-pill btn-outline-warning text-nowrap my-1"
                  href="../html/index.html"
                  role="button">
                  <i class="bi bi-door-open-fill"></i>
                  <span id="txt_sesion">Iniciar Sesión</span>
                </a>
                <a
                  id="linkCarrito"
                  class="btn rounded-pill btn-warning text-nowrap my-1 position-relative"
                  href="../html/carrito.html"
                  role="button">
                  <i class="bi bi-cart-fill"></i>
                  <span>Carrito</span>
                  <span
                    id="carritoBadge"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning-subtle">
                  </span>
                </a>
                <a
                  id="linkCatalogo"
                  class="btn rounded-pill btn-outline-warning text-nowrap my-1"
                  href="../html/catalogoProductos.html"
                  role="button">
                  <i class="bi bi-bag-fill"></i>
                  <span>Catálogo</span>
                </a>
              </div>

              <div class="dropdown order-md-3" data-bs-theme="dark">
                <button
                  type="button"
                  id="buttonAdminActions"
                  class="btn rounded-pill btn-outline-warning dropdown-toggle text-nowrap my-1"
                  data-bs-toggle="dropdown"
                  aria-expanded="false">
                  <i class="bi bi-gear-fill"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-sm-end">
                  <li>
                    <h5 class="dropdown-header text-warning">
                      Acciones de Administrador
                    </h5>
                  </li>
                  <li>
                    <a class="dropdown-item" href="../html/crear_cuenta.html"
                      >Alta de Usuarios</a
                    >
                  </li>
                  <li>
                    <a class="dropdown-item" href="../html/listadoCuentas.html"
                      >Usuarios Registrados</a
                    >
                  </li>
                  <li>
                    <a class="dropdown-item" href="../html/adminProductos.html"
                      >Registro de Productos</a
                    >
                  </li>
                  <li>
                    <a
                      class="dropdown-item"
                      href="../html/adminCategoriasEtiquetas.html"
                      >Categorías/Etiquetas</a
                    >
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="my-2">
      <!-- Listado del Carrito -->
      <section>
        <div
          class="card mx-auto col-12 col-sm-11 col-md-10 col-lg-8 col-xl-6 border-0 shadow-lg"
          data-bs-theme="dark">
          <div class="card-header mb-2 cardStyle border-bottom border-warning">
            <i class="bi bi-cart text-warning"></i>
            <span>Carrito</span>
          </div>

          <div id="contenedorItems"></div>
        </div>
      </section>

      <!-- Total del Carrito -->
      <div class="col-12 col-sm-11 col-md-10 col-lg-6 pt-3 mx-auto">
        <div class="card border-0 shadow-lg sticky-top" data-bs-theme="dark">
          <div class="card-body">
            <div class="d-flex justify-content-between">
              <h4>Total:</h4>
              <h3 id="total" class="text-warning"></h3>
            </div>

            <button
              id="botonFinalizarCompra"
              class="btn btn-warning w-100 mt-3">
              Finalizar compra
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer class="my-2"></footer>

    <script src="../js/bootstrap.bundle.js"></script>
    <script type="module" src="../js/carrito/vistaCarrito.js"></script>
    <script type="module" src="../js/carrito/vistaCarritoConfirmar.js"></script>
    <script type="module" src="../js/gestores/gestor_sesion.js"></script>
    <script type="module" src="../js/carritoBadge.js"></script>
    <script type="module" src="../js/btn_sesion.js"></script>
    <script type="module" src="../js/index.js"></script>
  </body>
</html>
